# Daily Postgres backup → object storage.
#
# This workflow runs once per day at 09:00 UTC and performs the actual
# `pg_dump | gzip | upload` work inside GitHub Actions. The backup is not
# delegated to the Railway api-server because that runtime does not include
# the Postgres client tooling needed for pg_dump.
#
# Required GitHub Action repository secrets:
#   - SUPABASE_DATABASE_URL
#   - SUPABASE_URL
#   - SUPABASE_STORAGE_BUCKET
#   - SUPABASE_SERVICE_ROLE_KEY
#
# The script is idempotent per UTC day: reruns overwrite the same
# `backups/db/YYYY-MM-DD.sql.gz` object, then the verification step confirms
# today's backup exists and has a plausible size.
name: Daily DB backup

on:
  schedule:
    # 09:00 UTC every day. Choose a window outside the team's working
    # hours to minimise lock contention against Supabase.
    - cron: "0 9 * * *"
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: |
          set -euo pipefail
          corepack enable
          pnpm install --frozen-lockfile

      - name: Install PostgreSQL 17 pg_dump wrapper
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/.github/bin"
          cat > "$GITHUB_WORKSPACE/.github/bin/pg_dump17" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          docker run --rm postgres:17 pg_dump "$@"
          EOF
          chmod +x "$GITHUB_WORKSPACE/.github/bin/pg_dump17"

      - name: Run production backup
        env:
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PG_DUMP_BIN: ${{ github.workspace }}/.github/bin/pg_dump17
          LOG_LEVEL: info
        run: |
          set -euo pipefail
          pnpm --filter @workspace/api-server run backup:db

      - name: Verify today's backup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LOG_LEVEL: info
        run: |
          set -euo pipefail
          pnpm --filter @workspace/api-server run backup:check
