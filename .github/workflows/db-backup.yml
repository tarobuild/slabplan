# Daily Postgres backup → object storage.
#
# This workflow is the "scheduled" half of the backup story. It runs once
# per day at 09:00 UTC and triggers the backup by POSTing to the api-server's
# `/api/internal/run-db-backup` webhook. The actual `pg_dump | gzip | upload`
# is performed inside the Railway deployment itself, so this workflow only
# needs the public webhook URL and the shared secret.
#
# Required GitHub Action repository secrets:
#   - BACKUP_WEBHOOK_URL    — full https URL to /api/internal/run-db-backup
#                             on the production deployment, e.g.
#                             https://slabplan-api-production.up.railway.app/api/internal/run-db-backup
#   - BACKUP_TRIGGER_SECRET — 32+ char shared secret. Must match the value
#                             of the same env var inside the production
#                             api-server deployment.
#
# Operator alternative: a Railway cron service running
# `pnpm --filter @workspace/api-server run backup:db` works too. Either
# scheduler is fine; running both is harmless (the script is idempotent
# per UTC day — same `backups/db/YYYY-MM-DD.sql.gz` object name).
name: Daily DB backup

on:
  schedule:
    # 09:00 UTC every day. Choose a window outside the team's working
    # hours to minimise lock contention against Supabase.
    - cron: "0 9 * * *"
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Trigger backup webhook
        env:
          BACKUP_WEBHOOK_URL: ${{ secrets.BACKUP_WEBHOOK_URL }}
          BACKUP_TRIGGER_SECRET: ${{ secrets.BACKUP_TRIGGER_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${BACKUP_WEBHOOK_URL:-}" ] || [ -z "${BACKUP_TRIGGER_SECRET:-}" ]; then
            echo "::error::BACKUP_WEBHOOK_URL and BACKUP_TRIGGER_SECRET must be configured as repo secrets."
            exit 1
          fi
          status=$(curl --silent --show-error --max-time 30 \
            --output /tmp/resp.json --write-out "%{http_code}" \
            -X POST "${BACKUP_WEBHOOK_URL}" \
            -H "x-backup-secret: ${BACKUP_TRIGGER_SECRET}" \
            -H "x-requested-with: XMLHttpRequest" \
            -H "content-type: application/json" \
            --data '{}')
          echo "HTTP ${status}"
          cat /tmp/resp.json || true
          # 202 = accepted (backup running in background); anything else fails the job.
          if [ "${status}" != "202" ]; then
            echo "::error::Backup webhook returned ${status}; see api-server deployment logs."
            exit 1
          fi
