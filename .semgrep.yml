# Project-level Semgrep suppressions for known false positives.
#
# This file documents config-level suppressions for findings that are
# safe by design. Each entry mirrors an inline `// nosemgrep:` /
# `# nosemgrep:` comment at the call site so a human reader sees the
# rationale at the offending line, while the entries here ensure
# future scans (including runs that ignore inline directives) stay
# clean.
#
# The runtime SAST scanner (`runSastScan`) loads its rule set from
# `.config/.semgrep/semgrep_rules.json`, which is environment-managed
# and not tracked in git; the same path-exclude entries listed below
# are also added there. Keeping a tracked copy here makes the policy
# visible in code review and survives an environment reset.

rules:
  - id: vendored-rules.generic.secrets.gitleaks.generic-api-key
    # Path globs (relative to repo root, as Semgrep interprets them)
    # that are exempt from the gitleaks generic-api-key rule.
    paths:
      exclude:
        # UNKNOWN_CLIENT_ID is a deterministic UUIDv5 sentinel used
        # to bucket orphan jobs/leads under a synthetic "unknown"
        # client. It is committed to the repo and the database on
        # purpose — not a credential. See the inline rationale in
        # the file.
        - "*/routes/clients.ts"
        # Same UUIDv5 sentinel, applied via INSERT and orphan-jobs
        # UPDATE in this migration.
        - "*/migrations/0010_clients_first_money.sql"
        # Dev-only seed CLI prints the freshly generated seed user's
        # password to stdout so the operator can copy it. The script
        # is invoked manually against a local database; there is no
        # production codepath that runs it.
        - "*/seed-cli.ts"
