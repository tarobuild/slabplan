        title:
          type: string
          minLength: 1
          maxLength: 255
        type:
          type: string
          enum:
            - non_workday
            - extra_workday
        startDate:
          type: string
          pattern: ^\d{4}-\d{2}-\d{2}$
        endDate:
          type: string
          pattern: ^\d{4}-\d{2}-\d{2}$
        sameEveryYear:
          type: boolean
        categoryId:
          type: string
          format: uuid
          nullable: true
        appliesToAllJobs:
          type: boolean
        jobIds:
          type: array
          items:
            type: string
            format: uuid
        notes:
          type: string
          nullable: true
