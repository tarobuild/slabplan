        - status
        - detail
    CursorPagination:
      type: object
      description: Pagination shape returned when the request supplied a `cursor` query parameter.
      properties:
        limit:
          type: integer
        hasMore:
          type: boolean
        nextCursor:
          type: string
          nullable: true
          description: Opaque cursor; pass to the next request as `?cursor=…`. `null` when there is no next page.
      required:
        - limit
        - hasMore
    PersonalAccessToken:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        scope:
          type: string
          enum:
            - read
            - read_write
        tokenPrefix:
          type: string
          description: First few characters of the token (always `cs_pat_`-prefixed).
        lastFour:
          type: string
          description: Last 4 characters of the token, for UI display.
        expiresAt:
          type: string
          format: date-time
          nullable: true
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        revokedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - scope
        - tokenPrefix
        - lastFour
        - createdAt
    PersonalAccessTokenList:
      type: object
      properties:
        tokens:
          type: array
          items:
            $ref: "#/components/schemas/PersonalAccessToken"
      required:
        - tokens
    PersonalAccessTokenCreated:
      type: object
      properties:
        token:
          $ref: "#/components/schemas/PersonalAccessToken"
        secret:
          type: string
          description: The full token secret. Returned exactly once; the server only stores a SHA-256 hash.
      required:
        - token
        - secret
    PersonalAccessTokenCreatePayload:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        scope:
          type: string
          enum:
            - read
            - read_write
          default: read_write
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Optional ISO 8601 expiry. Must be in the future.
      required:
        - name
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Optional client-supplied unique key. When present on a write request (POST/PUT/PATCH/DELETE), the server replays the exact stored response for any subsequent identical request within 24h. A different request body with the same key returns 409.
      schema:
        type: string
        minLength: 8
        maxLength: 255
    CursorParam:
      name: cursor
      in: query
      required: false
      description: |
        Opaque cursor for stable cursor-based pagination. To bootstrap the
        first cursor page, send `?cursor=&limit=N` (cursor present with no
        value) or simply `?limit=N` with no `page`/`pageSize` — the server
        returns the first page in the cursor envelope along with
        `pagination.nextCursor`. Echo `nextCursor` back as `?cursor=<token>`
        on subsequent calls. While in cursor mode `page`/`pageSize` are
        ignored.
      schema:
        type: string
    CursorLimitParam:
      name: limit
      in: query
      required: false
      description: Page size when in cursor-based pagination mode. Defaults to 25, max 100.
      schema:
        type: integer
        minimum: 1
        maximum: 100
  headers:
    X-RateLimit-Limit:
      description: Maximum number of requests allowed in the current rate-limit window.
      schema:
        type: integer
    X-RateLimit-Remaining:
      description: Requests remaining in the current rate-limit window.
      schema:
        type: integer
    X-RateLimit-Reset:
      description: Unix timestamp (seconds) when the current rate-limit window resets.
      schema:
        type: integer
    Retry-After:
      description: Number of seconds the client should wait before retrying. Sent on 429 responses.
      schema:
        type: integer
security:
  - bearerAuth: []
