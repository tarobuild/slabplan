      x-zod-query-schema: userListQuerySchema
      security:
        - bearerAuth: []
      parameters:
        - name: includeInactive
          in: query
          required: false
          description: Admin-only. When `true` the response also includes deactivated users.
          schema:
            type: boolean
            default: false
        - name: roles
          in: query
          required: false
          description: Comma-separated list of role names to filter by (`admin`, `project_manager`, `crew_member`).
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: 1-indexed page number. Defaults to 1.
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          required: false
          description: Page size. Defaults to 100, max 200.
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
        - name: offset
          in: query
          required: false
          description: Row offset. Mutually exclusive with `page`.
          schema:
            type: integer
            minimum: 0
    post:
      operationId: users_post_users
      tags:
        - users
      summary: POST /users
      description: Admin-only. Invite a new worker. Creates the user with a random unguessable placeholder password and a single-use setup token. The raw token is returned exactly once (never persisted in plain text). Hand the resulting `invitePath` to the new user out of band.
      responses:
        "201":
          description: Created. Returns the new user plus the one-time setup token and path.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyValue"
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
