  /search:
    get:
      operationId: search_get_search
      tags:
        - search
      summary: GET /search
      description: |
        Route defined in artifacts/api-server/src/routes/search.ts. Validated query with querySchema. Returns results paged through the {results, pagination} envelope so callers can scroll past the first page of matches.

        Supports both page-based (`page`/`pageSize`) and cursor-based (`cursor`/`limit`) pagination; when `cursor` is provided, the response's `pagination` field uses the `CursorPagination` shape.

        Cursor scroll usage: pass `?q=<text>` (and optionally `?limit=N`, default 10) on the first request, then echo *just* `?cursor=<nextCursor>` on every follow-up request. The cursor envelope embeds the original `q`, the effective `limit`, and the next page index, so follow-up requests do NOT need to repeat `q` or `limit`. If you do supply either alongside the cursor, the value must match what the cursor was minted with — mismatches return 400 to prevent silent skipping/duplication of rows. The first request must include `q`; a request that supplies neither `q` nor a valid `cursor` returns 400.

        Note: /search is a federated multi-source query (jobs, leads, files, schedule, clients, contacts), so its cursor is an *opaque page-token* over deterministic per-source ranking (not a true keyset cursor). Inserts/deletes between requests can shift items by ±1 row across pages; callers needing strict point-in-time consistency should query a single-source endpoint that exposes a real keyset cursor.
      parameters:
        - name: q
          in: query
          required: false
          description: Search query string (1–100 chars). Required on the first request. On follow-up requests that pass `?cursor=<token>` the query is taken from the cursor, so `q` may be omitted; if supplied alongside a cursor it must equal the cursor's embedded query.
          schema:
            type: string
            minLength: 1
            maxLength: 100
        - name: page
          in: query
          required: false
          description: Page number (1-based) for offset pagination. Ignored when `cursor` is supplied. Capped at 20.
          schema:
            type: integer
            minimum: 1
            maximum: 20
        - name: pageSize
          in: query
          required: false
          description: Page size for offset pagination. Ignored when `cursor` is supplied. Max 25.
          schema:
            type: integer
            minimum: 1
            maximum: 25
        - name: limit
          in: query
          required: false
          description: Page size for cursor pagination. Default 10; max 25.
          schema:
            type: integer
            minimum: 1
            maximum: 25
        - $ref: "#/components/parameters/CursorParam"
      responses:
        "200":
          description: Paged search results.
          content:
            application/json:
              schema:
                type: object
                required:
                  - results
                  - pagination
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - type
                        - title
                        - href
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                          enum:
                            - job
                            - lead
                            - file
                            - schedule
                            - client
                        title:
                          type: string
                        subtitle:
                          type: string
                        href:
                          type: string
                        clientId:
                          type: string
                          nullable: true
                          description: For job results, the linked client UUID (or null when unassigned). Omitted for non-job results.
                        clientName:
                          type: string
                          nullable: true
                          description: For job results, the linked client's company name (or null when unassigned). Omitted for non-job results.
                  pagination:
                    description: Page-mode pagination (`{page, pageSize, hasMore}`) when the request used `?page=`/`?pageSize=`. Cursor-mode pagination (`CursorPagination`) when the request used `?cursor=` or `?limit=`.
                    oneOf:
                      - type: object
                        required:
                          - page
                          - pageSize
                          - hasMore
                        properties:
                          page:
                            type: integer
                            minimum: 1
                          pageSize:
                            type: integer
                            minimum: 1
                          hasMore:
                            type: boolean
                      - $ref: "#/components/schemas/CursorPagination"
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
