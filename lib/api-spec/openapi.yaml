        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonalAccessTokenCreatePayload"
      responses:
        "201":
          description: Token created. The `secret` field will not be returned again.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonalAccessTokenCreated"
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "400":
          description: Invalid payload
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "403":
          description: Tokens cannot mint other tokens.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
  /account/tokens/{id}:
    delete:
      operationId: accountTokens_revoke
      tags:
        - account-tokens
      summary: Revoke a personal access token.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "204":
          description: Token revoked.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
        "404":
          description: Token not found.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Error:
      type: object
      properties:
        error:
          type: string
        details: {}
      required:
        - error
    AnyValue: {}
    GenericObject:
      type: object
      additionalProperties: true
    users_updateProfileSchema:
      type: object
      additionalProperties: true
      description: Request schema derived from updateProfileSchema in artifacts/api-server/src/routes/users.ts.
    users_changePasswordSchema:
      type: object
      additionalProperties: true
      description: Request schema derived from changePasswordSchema in artifacts/api-server/src/routes/users.ts.
    users_inviteUserSchema:
      type: object
      description: Request body for `POST /users` — admin invites a new worker. The user is created with a random placeholder password and the response contains a one-time setup token & path that must be handed to the invitee out of band.
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        fullName:
          type: string
          minLength: 2
          maxLength: 255
        role:
          type: string
          enum:
            - admin
            - project_manager
            - crew_member
      required:
        - email
        - fullName
        - role
    users_updateUserSchema:
      type: object
      description: Request body for `PATCH /users/{id}` — admin updates a worker's full name, role, or active flag. At least one field must be provided. An admin cannot deactivate their own account through this endpoint.
      properties:
        fullName:
          type: string
          minLength: 2
          maxLength: 255
        role:
          type: string
          enum:
            - admin
            - project_manager
            - crew_member
        isActive:
          type: boolean
    auth_acceptInviteSchema:
      type: object
      description: Request body for `POST /auth/accept-invite`. The invitee posts the raw token from their setup link plus the password they want to use. On success the user is logged in (refresh cookie + access token in response).
      properties:
        token:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
      required:
        - token
        - password
    clients_clientPayloadSchema:
      type: object
      description: Request body for creating or updating a client (`POST /clients`, `PUT /clients/{id}`). Optional string fields accept null and empty strings (which are normalized to null). `state` must be a 2-character abbreviation when provided.
      properties:
        companyName:
          type: string
          minLength: 1
          maxLength: 255
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        streetAddress:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
          maxLength: 2
        zipCode:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      required:
        - companyName
    clients_contactPayloadSchema:
      type: object
      description: Request body for creating or updating a client contact (`POST /clients/{id}/contacts`, `PUT /clients/{id}/contacts/{contactId}`). At least one of firstName/lastName/email is recommended in practice; only `isPrimary` has a server default of `false`.
      properties:
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        cellPhone:
          type: string
          nullable: true
        isPrimary:
          type: boolean
          default: false
    jobs_assigneePayloadSchema:
      type: object
      description: Request body for `POST /jobs/{id}/assignees`. Attaches a single user to the job.
      properties:
        userId:
          type: string
          format: uuid
          description: Identifier of the user to attach as a job assignee. Must reference an assignable user (admin, manager, or staff).
      required:
        - userId
    jobs_jobPayloadSchema:
      type: object
      description: Request body for creating or updating a job. `POST /jobs` additionally accepts `assigneeIds`. Money fields (`contractPrice`, `squareFeet`) are accepted as either string or number and serialized as decimal strings.
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        status:
          type: string
          enum:
            - open
            - closed
            - archived
          default: open
        streetAddress:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
          maxLength: 2
        zipCode:
          type: string
          nullable: true
        contractPrice:
          type:
            - string
            - number
            - "null"
          description: Decimal serialized as a string in responses; accepted as either string or number on input. Server coerces to a decimal string.
        jobType:
          type: string
          nullable: true
          enum:
            - kitchen_countertops
            - bathrooms
            - flooring
            - backsplash
            - full_house_project
            - custom
        workDays:
          type: array
          nullable: true
          items:
            type: string
            enum:
              - mon
              - tue
              - wed
              - thu
              - fri
              - sat
              - sun
          default: null
        projectedStart:
          type: string
          nullable: true
          pattern: ^\d{4}-\d{2}-\d{2}$
          description: "Calendar date in `YYYY-MM-DD` format. Sent and stored as a plain string — **not** an ISO timestamp and **not** coerced to a `Date` (the handler rejects any other form, including timezone offsets). `format: date` is intentionally omitted so generated clients keep this as a `string`, matching the handler's `optionalDate` zod transform."
        projectedCompletion:
          type: string
          nullable: true
          pattern: ^\d{4}-\d{2}-\d{2}$
          description: "Calendar date in `YYYY-MM-DD` format. See `projectedStart` for why `format: date` is intentionally omitted."
        actualStart:
          type: string
          nullable: true
          pattern: ^\d{4}-\d{2}-\d{2}$
          description: "Calendar date in `YYYY-MM-DD` format. See `projectedStart` for why `format: date` is intentionally omitted."
        actualCompletion:
          type: string
          nullable: true
          pattern: ^\d{4}-\d{2}-\d{2}$
          description: "Calendar date in `YYYY-MM-DD` format. See `projectedStart` for why `format: date` is intentionally omitted."
        contractType:
          type: string
          nullable: true
          enum:
            - fixed_price
            - open_book
            - null
        internalNotes:
          type: string
          nullable: true
        subVendorNotes:
          type: string
          nullable: true
        squareFeet:
          type:
            - string
            - number
            - "null"
          description: Decimal serialized as a string in responses; accepted as either string or number on input.
        permitNumber:
          type: string
          nullable: true
        projectManagerId:
          type: string
          format: uuid
          nullable: true
        clientId:
          type: string
          format: uuid
          nullable: true
          description: Optional on `PUT /jobs/{id}`. **Required on `POST /jobs`** — see `jobs_jobCreatePayloadSchema`. The DB column is nullable to support legacy rows backfilled to the system "Unknown client" placeholder, but new jobs must always be attached to a chosen client.
        contractValueCents:
          type: integer
          nullable: true
          minimum: 0
          maximum: 9007199254740991
          description: Total contract value in whole cents (USD). Optional. Bounded by JS `Number.MAX_SAFE_INTEGER` so the value round-trips through JSON without precision loss; **never** `bigint`. Server enforces `amountPaidCents <= contractValueCents` when both are set.
        amountPaidCents:
          type: integer
          nullable: true
          minimum: 0
          maximum: 9007199254740991
          description: Total amount paid against the contract in whole cents (USD). Optional. Bounded by JS `Number.MAX_SAFE_INTEGER`; never `bigint`.
      required:
        - title
    jobs_jobCreatePayloadSchema:
      type: object
      description: Request body for `POST /jobs`. Extends `jobs_jobPayloadSchema` with `assigneeIds` (admin-only) and an additional **required `clientId`**. The handler rejects POSTs without a `clientId` with `400 "clientId is required when creating a job."`.
      allOf:
        - $ref: "#/components/schemas/jobs_jobPayloadSchema"
        - type: object
          properties:
            clientId:
              type: string
              format: uuid
              description: Identifier of the client this job belongs to. Required on create.
            assigneeIds:
              type: array
              items:
                type: string
                format: uuid
              default: []
              description: Initial assignees. Only honored by admin callers; non-admins must omit this field.
          required:
            - clientId
    leads_leadPayloadSchema:
      type: object
      description: Request body for creating or updating a lead (`POST /leads`, `PUT /leads/{id}`).
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        streetAddress:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
          maxLength: 2
        zipCode:
          type: string
          nullable: true
        confidence:
          type: integer
          minimum: 0
          maximum: 100
          default: 0
        projectedSalesDate:
          type: string
          nullable: true
          pattern: ^\d{4}-\d{2}-\d{2}$
          description: "Calendar date in `YYYY-MM-DD` format. Sent and stored as a plain string — **not** an ISO timestamp and **not** coerced to a `Date` (the handler's `optionalDate` zod transform rejects any other form). `format: date` is intentionally omitted so generated clients keep this as a `string`, matching the handler."
        estimatedRevenueMin:
          type:
            - string
            - number
            - "null"
          description: Decimal serialized as a string in responses; accepted as either string or number on input.
        estimatedRevenueMax:
          type:
            - string
            - number
            - "null"
          description: Decimal serialized as a string in responses; accepted as either string or number on input.
        status:
          type: string
          enum:
            - open
            - in_negotiation
            - won
            - lost
            - archived
          default: open
        projectType:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        leadSource:
          type: string
          nullable: true
        salespeople:
          type: array
          items:
            type: string
            format: uuid
          default: []
        tags:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 100
          default: []
        sources:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 100
          default: []
      required:
        - title
    leads_contactCreateSchema:
      type: object
      description: Request body for creating a lead contact (`POST /leads/{id}/contacts`). When `sourceContactId` is set the new contact is cloned from an existing contact and the other fields are optional. Otherwise `displayName` and `email` are required.
      properties:
        sourceContactId:
          type: string
          format: uuid
          description: "Optional: clone an existing lead contact by id rather than creating a new one from scratch."
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        displayName:
          type: string
          nullable: true
        streetAddress:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
          maxLength: 2
        zipCode:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        cellPhone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
          format: email
        label:
          type: string
          nullable: true
    leads_contactUpdateSchema:
      type: object
      description: Request body for updating a lead contact (`PUT /leads/{id}/contacts/{contactId}`).
      properties:
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        displayName:
          type: string
          nullable: true
        streetAddress:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
          maxLength: 2
        zipCode:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        cellPhone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
          format: email
        label:
          type: string
          nullable: true
    leads_activityCreateSchema:
      type: object
      description: Request body for logging a lead activity (`POST /leads/{id}/activities`).
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        notes:
          type: string
          nullable: true
      required:
        - title
    folders_folderBodySchema:
      type: object
      additionalProperties: true
      description: Request schema derived from folderBodySchema in artifacts/api-server/src/routes/folders.ts.
    folders_folderUpdateSchema:
      type: object
      additionalProperties: true
      description: Request schema derived from folderUpdateSchema in artifacts/api-server/src/routes/folders.ts.
    folders_moveFolderSchema:
      type: object
      additionalProperties: true
      description: Request schema derived from moveFolderSchema in artifacts/api-server/src/routes/folders.ts.
    files_renameFileSchema:
      type: object
      additionalProperties: true
      description: Request schema derived from renameFileSchema in artifacts/api-server/src/routes/files.ts.
    daily_logs_dailyLogPayloadSchema:
      type: object
      description: Request body for creating or updating a daily log (`POST /jobs/{jobId}/daily-logs`, `PUT /daily-logs/{id}`). On create, `jobId` is taken from the URL; on update the URL identifies the log directly. `customFieldValues` is a free-form object whose values are scalar (string, number, boolean, or null).
      properties:
        jobId:
          type: string
          format: uuid
          description: Optional override; the URL `jobId` always wins on create.
        logDate:
          type: string
          pattern: ^\d{4}-\d{2}-\d{2}$
        title:
          type: string
          nullable: true
        notes:
          type: string
          default: ""
        weatherData:
          description: Snapshot of weather captured at the time the log was authored. Stored verbatim for client-side rendering.
          oneOf:
            - $ref: "#/components/schemas/DailyLogWeather"
            - type: "null"
        includeWeather:
          type: boolean
          default: true
        includeWeatherNotes:
          type: boolean
          default: false
        weatherNotes:
          type: string
          nullable: true
        shareInternalUsers:
          type: boolean
          default: true
        shareSubsVendors:
          type: boolean
          default: false
        shareClient:
          type: boolean
          default: false
        isPrivate:
          type: boolean
          default: false
        notifyUserIds:
          type: array
          items:
            type: string
            format: uuid
          default: []
        tags:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 100
          default: []
        customFieldValues:
          type: object
          description: Map of custom field id → scalar value (string, number, boolean, or null).
          additionalProperties:
            oneOf:
              - type: string
              - type: number
              - type: boolean
              - type: "null"
          default: {}
      required:
        - logDate
    daily_logs_commentPayloadSchema:
      type: object
      description: Request body for creating a daily-log comment (`POST /daily-logs/{id}/comments`).
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 10000
        parentCommentId:
          type: string
          format: uuid
          nullable: true
        mentions:
          type: array
          items:
            type: string
            format: uuid
          default: []
        attachments:
          type: array
          maxItems: 10
          items:
            type: object
            properties:
              fileId:
                type: string
                format: uuid
            required:
              - fileId
          default: []
        links:
          type: array
          items:
            type: string
            format: uri
          default: []
      required:
        - body
    daily_logs_commentReactionPayloadSchema:
      type: object
      description: Request body for toggling a reaction on a daily-log comment (`PUT /daily-logs/{id}/comments/{commentId}/reactions`). Sending the same emoji twice removes the reaction.
      properties:
        emoji:
          type: string
          minLength: 1
          maxLength: 32
      required:
        - emoji
    daily_logs_todoPayloadSchema:
      type: object
      description: Request body for creating a daily-log to-do (`POST /daily-logs/{id}/todos`).
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
      required:
        - title
    daily_logs_todoTogglePayloadSchema:
      type: object
      description: Request body for toggling a daily-log to-do (`PUT /daily-logs/{id}/todos/{todoId}`). Omitting `isComplete` flips the current value.
      properties:
        isComplete:
          type: boolean
    schedule_schedulePhasePayloadSchema:
      type: object
      description: Request body for creating or updating a schedule phase.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        color:
          type: string
          nullable: true
      required:
        - name
    schedule_scheduleSettingPayloadSchema:
      type: object
      description: Request body for creating or renaming a schedule setting (e.g. tag).
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
      required:
        - name
    schedule_schedulePayloadSchema:
      type: object
      description: Request body for creating or updating a schedule item (`POST /jobs/{jobId}/schedule`, `PUT /schedule-items/{id}`). Hourly items require a `startTime`. Predecessors must be unique and may not point at the item being edited.
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        displayColor:
          type: string
          nullable: true
        assigneeIds:
          type: array
          items:
            type: string
            format: uuid
          default: []
        notifyUserIds:
          type: array
          items:
            type: string
            format: uuid
          default: []
        startDate:
          type: string
          pattern: ^\d{4}-\d{2}-\d{2}$
        workDays:
          type: integer
          minimum: 1
          maximum: 365
          default: 1
        endDate:
          type: string
          nullable: true
          pattern: ^\d{4}-\d{2}-\d{2}$
          description: When omitted or null the server computes the end date from `startDate`, `workDays`, and the active workday-exception calendar.
        isHourly:
          type: boolean
          default: false
        startTime:
          type: string
          nullable: true
          pattern: ^\d{2}:\d{2}(:\d{2})?$
        endTime:
          type: string
          nullable: true
          pattern: ^\d{2}:\d{2}(:\d{2})?$
        progress:
          type: integer
          minimum: 0
          maximum: 100
          default: 0
        reminder:
          type: string
          default: none
          description: One of the configured reminder options (e.g. `none`, `1d`, `1h`).
        notes:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 100
          default: []
        predecessors:
          type: array
          default: []
          items:
            type: object
            properties:
              scheduleItemId:
                type: string
                format: uuid
              dependencyType:
                type: string
                enum:
                  - finish_to_start
                  - start_to_start
                  - finish_to_finish
                  - start_to_finish
              lagDays:
                type: integer
                minimum: 0
                maximum: 365
                default: 0
            required:
              - scheduleItemId
              - dependencyType
        phaseId:
          type: string
          format: uuid
          nullable: true
        showOnGantt:
          type: boolean
          default: true
        visibleToEstimators:
          type: boolean
          default: true
        visibleToInstallers:
          type: boolean
          default: true
        visibleToOfficeStaff:
          type: boolean
          default: true
        isComplete:
          type: boolean
          default: false
        isPersonalTodo:
          type: boolean
          default: false
      required:
        - title
        - startDate
    schedule_scheduleNotePayloadSchema:
      type: object
      description: Request body for adding a note to a schedule item.
      properties:
        note:
          type: string
          minLength: 1
          maxLength: 10000
      required:
        - note
    Pagination:
      type: object
      description: Standard pagination metadata returned with list responses.
      properties:
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
        totalItems:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 1
      required:
        - page
        - pageSize
        - totalItems
        - totalPages
    SuccessResponse:
      type: object
      description: Generic success acknowledgement returned by destructive operations.
      properties:
        success:
          type: boolean
      required:
        - success
    JobSummary:
      type: object
      description: Summary view of a job used in client detail and client-job listings.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        jobType:
          type: string
          nullable: true
          enum:
            - kitchen_countertops
            - bathrooms
            - flooring
            - backsplash
            - full_house_project
            - custom
        contractPrice:
          type: string
          nullable: true
          description: Decimal price serialized as string.
        contractValueCents:
          type: integer
          format: int64
          nullable: true
          minimum: 0
        amountPaidCents:
