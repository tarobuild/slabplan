    WorkdayException:
      type: object
      description: A workday exception (non-workday or extra-workday) attached to one or more jobs, or applied company-wide when `appliesToAllJobs` is true.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        type:
          type: string
          enum:
            - non_workday
            - extra_workday
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        sameEveryYear:
          type: boolean
          nullable: true
        categoryId:
          type: string
          format: uuid
          nullable: true
        appliesToAllJobs:
          type: boolean
          nullable: true
          description: When true, the exception applies to every active job. Only admins can create, update, or delete company-wide exceptions.
        jobIds:
          type: array
          nullable: true
          description: When `appliesToAllJobs` is false, the explicit list of job IDs the exception applies to.
          items:
            type: string
            format: uuid
        notes:
          type: string
          nullable: true
        createdBy:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - title
        - type
        - startDate
        - endDate
    WorkdayExceptionResponse:
      type: object
      description: Response wrapper for create/update workday-exception endpoints.
      properties:
        exception:
          $ref: "#/components/schemas/WorkdayException"
      required:
        - exception
    WorkdayExceptionPayload:
      type: object
      description: Request body for `POST /jobs/{jobId}/workday-exceptions`. Either `appliesToAllJobs` must be true (admin-only) or `jobIds` must contain at least one job the caller can manage.
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        type:
          type: string
          enum:
            - non_workday
            - extra_workday
        startDate:
          type: string
          pattern: ^\d{4}-\d{2}-\d{2}$
        endDate:
          type: string
          pattern: ^\d{4}-\d{2}-\d{2}$
        sameEveryYear:
          type: boolean
          default: false
        categoryId:
          type: string
          format: uuid
          nullable: true
        appliesToAllJobs:
          type: boolean
          default: false
          description: When true, applies the exception to every active job. Admin role required.
        jobIds:
          type: array
          items:
            type: string
            format: uuid
          default: []
        notes:
          type: string
          nullable: true
      required:
        - title
        - type
        - startDate
        - endDate
    WorkdayExceptionUpdatePayload:
      type: object
      description: Request body for `PUT /jobs/{jobId}/workday-exceptions/{exceptionId}`. All fields are optional; omitted fields keep their previous value. Toggling `appliesToAllJobs` is admin-only.
