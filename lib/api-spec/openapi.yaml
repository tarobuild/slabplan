            - $ref: "#/components/schemas/ClientPrimaryContact"
            - type: "null"
        contactCount:
          type: integer
          minimum: 0
        jobCount:
          type: integer
          minimum: 0
          description: Number of jobs for this client visible to the caller. Equivalent to `totalJobCount`; preserved for backward compatibility.
        openJobCount:
          type: integer
          minimum: 0
          description: Number of jobs for this client that are not closed/archived. Equivalent to `activeJobCount`; preserved for backward compatibility.
        activeJobCount:
          type: integer
          minimum: 0
          description: Number of jobs for this client whose status is neither `closed` nor `archived`. Visible to the caller.
        totalJobCount:
          type: integer
          minimum: 0
          description: Total number of jobs for this client visible to the caller (regardless of status).
        contractValueCents:
          type: integer
          format: int64
          minimum: 0
          description: Sum of `contractValueCents` across all caller-visible jobs for this client. Cents.
        amountPaidCents:
          type: integer
          format: int64
          minimum: 0
          description: Sum of `amountPaidCents` across all caller-visible jobs for this client. Cents.
        outstandingCents:
          type: integer
          format: int64
          minimum: 0
          description: "AR rollup: `max(0, contractValueCents - amountPaidCents)`. Cents."
        lastActivityAt:
          type: string
          format: date-time
          nullable: true
          description: Most recent `jobs.updated_at` across the caller-visible jobs for this client.
        deletedAt:
          type: string
          format: date-time
          nullable: true
          description: Soft-delete timestamp for the client itself.
        archived:
          type: boolean
          description: True when the client itself is soft-deleted (`deletedAt is not null`).
