# ============================================================================
# SECURITY: Minimum release age for npm packages (supply-chain attack defense)
# ============================================================================
#
# This setting requires that any npm package version must have been published
# for at least 1 day (1440 minutes) before pnpm will allow installing it.
# This is a critical defense against supply-chain attacks. In most cases,
# malicious npm releases are discovered and pulled within hours, so a 1-day
# delay provides a strong safety buffer.
#
# DO NOT DISABLE THIS SETTING. Removing or setting it to 0 is considered
# extremely dangerous and leaves the entire workspace vulnerable to supply-
# chain attacks, which have been the #1 vector for npm ecosystem compromises.
#
# If you absolutely need to install a package before the 1-day window has
# passed (e.g. an urgent security bugfix), you can add it to the
# `minimumReleaseAgeExclude` allowlist below. Only consider doing this for
# packages released by trusted organizations with an impeccable security
# posture (e.g. Replit packsges, react from Meta, typescript from Microsoft). Even then,
# remove the exclusion once the 1-day window has passed.
#
# Example:
#   minimumReleaseAgeExclude:
#     - react
#     - typescript
#
# ============================================================================
minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  # Exclude @replit scoped packages from the minimum release age check.
  # These are published by Replit and trusted — the supply-chain attack vector
  # this setting guards against does not apply to our own packages.
  - '@replit/*'
  - stripe-replit-sync

packages:
  - artifacts/*
  - lib/*
  - lib/integrations/*
  - scripts

catalog:
  '@replit/vite-plugin-cartographer': ^0.5.1
  '@replit/vite-plugin-dev-banner': ^0.1.1
  '@replit/vite-plugin-runtime-error-modal': ^0.0.6
  '@tailwindcss/vite': ^4.1.14
  '@tanstack/react-query': ^5.90.21
  '@types/node': ^25.3.3
  '@types/react': ^19.2.0
  '@types/react-dom': ^19.2.0
  '@vitejs/plugin-react': ^5.0.4
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  drizzle-orm: ^0.45.2
  framer-motion: ^12.23.24
  lucide-react: ^0.545.0
  # Must be this exact version because expo requires it
  react: 19.1.0
  # Must be this exact version because expo requires it
  react-dom: 19.1.0
  tailwind-merge: ^3.3.1
  tailwindcss: ^4.1.14
  tsx: ^4.21.0
  vite: ^7.3.2
  zod: ^3.25.76

autoInstallPeers: false

onlyBuiltDependencies:
  - '@swc/core'
  - bcrypt
  - esbuild
  - msw
  - unrs-resolver

overrides:
  brace-expansion: 2.0.3
  lodash: 4.18.1
  path-to-regexp: 8.4.2
  picomatch: 4.0.4
  yaml: 2.8.3
  fast-uri: 3.1.2
  # ----- audit pins (Task #100) -----
  # axios <1.15.0 — SSRF via NO_PROXY normalization, header-injection
  # cloud metadata exfiltration. Fixed in 1.15.0; we pin within axios's
  # current major (1.x) so no breaking API change.
  axios: 1.15.2
  # follow-redirects <=1.15.11 — leaks custom auth headers cross-domain.
  # Fixed in 1.16.0; transitive of axios.
  follow-redirects: 1.16.0
  # dompurify <3.4.0 — multiple FORBID_TAGS / SAFE_FOR_TEMPLATES bypasses.
  # Fixed in 3.4.0; transitive of jspdf. We can't bump jspdf majors per
  # the task constraints (would risk breaking PDF export), so override
  # the transitive instead.
  dompurify: 3.4.1
  # fast-xml-parser <5.7.0 — XMLBuilder comment/CDATA injection. Fixed
  # in 5.7.0; transitive of @google-cloud/storage.
  fast-xml-parser: 5.7.2
  # uuid <14.0.0 — missing buffer bounds check in v3/v5/v6. The advisory
  # is only patched in 14.x. Verified non-breaking for our consumers
  # (@google-cloud/storage's gaxios, teeny-request, etc. only use uuid.v4
  # for random IDs, which is API-stable across majors). Smoke-tested
  # file upload + delete after the bump.
  uuid: 14.0.0
  # postcss <8.5.10 — XSS via unescaped </style> in CSS stringify output
  # (GHSA-qx2v-qp2m-jg93, moderate). Dev-only transitive of vite/tailwind;
  # PostCSS does not run at runtime. Pinning to the patched 8.x line
  # (latest 8.5.12 as of 2026-04-30); same major as the version Vite/Tailwind
  # already resolve, so no API break. Tracked in Task #212.
  postcss: ^8.5.12
  # @tootallnate/once <3.0.1 — incorrect control flow scoping (GHSA-vpq2-c234-7xj6, low).
  # Transitive of @google-cloud/storage via teeny-request > http-proxy-agent.
  # Previously deferred (Task #176 / Task #100) due to concern that 3.0.1
  # is ESM-only and might break the CJS http-proxy-agent@5 consumer.
  # Pinning now per Task #384; install + typecheck verified passing. (Task #384)
  "@tootallnate/once": "^3.0.1"
  # hono <4.12.16 — two advisories: bodyLimit() bypass (GHSA-9vqf-7f2p-gf9v,
  # moderate) and hono/jsx unvalidated tag names / HTML injection
  # (GHSA-69xw-7hcm-h432, moderate). Transitive of
  # @modelcontextprotocol/sdk. (Task #384)
  hono: "^4.12.16"
  # ip-address <=10.1.0 — XSS in Address6 HTML-emitting methods
  # (GHSA-v2v4-37r5-5v8g, moderate). Transitive of
  # @modelcontextprotocol/sdk via express-rate-limit. (Task #384)
  ip-address: "^10.1.1"
  # ----- end audit pins -----
